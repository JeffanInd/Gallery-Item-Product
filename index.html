<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Gallery Item</title>

    <!-- Panggil file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- IMAGE ZOOM MODAL -->
    <div id="imageModal">
        <span id="closeZoom">&times;</span>
        <img id="zoomImg">
    </div>

    <!-- MAIN APP LAYOUT -->
    <div class="app-layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <img src="https://www.jeffan.com/secure/extensions/Intente/Jeffan_21_1_0/21.1.0/img/jeffan-logo.png"
                class="sidebar-logo" alt="Logo Sidebar">

            <h1>ERP Application System</h1>
            <h2>Update.Ver.03.VI.2026</h2>

            <div id="clock-container">
                <div id="clock-time">00:00:00</div>
                <div id="clock-date">-</div>
            </div>

            <div class="container">
                <h2>🗂️ Gallery Item Jeffan</h2>

                <select id="vendorSelector"></select>
                <select id="kategoriSelector"></select>
                <select id="kodeSelector"></select>

                <label>Search Item by Code:</label>
                <input type="text" id="KodeSearch" placeholder="Sample: AB-309804-WH">

                <div>
                    <button id="previousButton">← Previous</button>
                    <button id="nextButton">Next →</button>
                    <button onclick="backPurchaseOrder()">🔙 Back to Purchase Order</button>
                     <button onclick="backToApp1()">🔙 Back to Dashboard</button>
                </div>

                <div class="toko-online" id="dashboardLinks">
                    <h4>Visit Our Online Store</h4>
                    <div class="link-toko">
                        <a href="https://www.jeffan.com/" target="_blank">🌐 Jeffan Store</a>
                        <a href="https://www.wayfair.com" target="_blank">🌐 Wayfair</a>
                        <a href="https://s.id/atrisna" target="_blank">https://myadmin.co.id</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- DETAIL ITEM -->
        <div id="itemDetail" style="display:none;"></div>
    </div>

    <!-- Panggil file JS -->
    <script src="script.js"></script>
</body>
</html>
